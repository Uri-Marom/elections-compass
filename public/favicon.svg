<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" fill="#1e1e2e" stroke="#6c63ff" stroke-width="2.5"/>
  <!-- Cardinal tick marks -->
  <line x1="32" y1="4" x2="32" y2="10" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="54" x2="32" y2="60" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="4" y1="32" x2="10" y2="32" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="54" y1="32" x2="60" y2="32" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
  <!-- North needle (red) -->
  <polygon points="32,10 28,34 32,30 36,34" fill="#ff4d6d"/>
  <!-- South needle (white/light) -->
  <polygon points="32,54 28,30 32,34 36,30" fill="#e0e0ff" opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#6c63ff"/>
</svg>
